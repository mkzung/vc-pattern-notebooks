name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  validate-and-execute:
    name: validate + execute notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            pip install -r requirements.lock
          else
            pip install -r requirements.txt
          fi
          pip install nbconvert nbformat ipykernel

      - name: stage CI sample data
        # The committed sample (data/raw/sample_unicorns.csv, sample_founders.csv)
        # is what CI validates and what the notebooks execute against. We copy
        # it into the canonical filenames so the notebooks' Path('..') lookups
        # resolve without modifying notebook code.
        run: |
          mkdir -p data/raw
          cp data/raw/sample_unicorns.csv data/raw/unicorns.csv
          cp data/raw/sample_founders.csv data/raw/founders.csv
          cp data/raw/sample_fetch_log.json data/raw/_fetch_log.json

      - name: validate data
        run: python scripts/validate_data.py

      - name: execute notebooks
        run: |
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=120 \
            --output-dir /tmp/executed \
            notebooks/*.ipynb

  lint:
    name: ruff + nbqa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff nbqa

      - name: ruff check scripts/
        run: ruff check scripts/

      - name: nbqa ruff notebooks/
        # Allow long-line, unused-import, repeat-import, multi-import-per-line,
        # cell-trailing-expression warnings — these are notebook idioms, not bugs.
        run: nbqa ruff notebooks/ --ignore=E501,F401,F404,E402,E401,E702,I001,B018,B905
